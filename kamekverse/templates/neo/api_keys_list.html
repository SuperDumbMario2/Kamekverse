<div class="main-column"><div class="post-list-outline">
    <h2 class="label">My API Keys</h2>
    <div class="setting-form">
      <p>API Keys:</p>
      <ul>
        {% for k in api_keys %}
        <li>{{k.name}} <a href="/settings/api/toggle_activation/{{k.id}}">{% if k.is_usable %}Revoke{% else %}Enable{% endif %}</a> | <a href="/settings/api/regenerate/{{k.id}}">Regenerate</a></a></li>
        {% endfor %}
      </ul>
    <ul class="settings-list">
      <form method="post" action="/settings/api/new">
        <h2>New API key</h2>
        <input type="text" name="key_name" placeholder="Key name" />
        <div class="form-buttons">
        <input type="submit" class="black-button apply-button" value="Add">
